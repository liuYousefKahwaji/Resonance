name: resonance
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.2
  file: ^7.0.1
  path_provider: ^2.1.5
  just_audio: ^0.9.8
  just_audio_windows: ^0.2.0
  audio_session: ^0.1.24
  audio_service: ^0.18.18
  provider: ^6.1.5+1
  path: ^1.9.1
  hotkey_manager: ^0.2.3
  hotkey_manager_windows: ^0.2.0
  shared_preferences: ^2.5.5
  audio_metadata_extractor: ^0.0.4
  tray_manager: ^0.5.3
  window_manager: ^0.5.1
  restart_app: ^1.8.3
  audio_service_win: ^0.0.3
  desktop_drop: ^0.7.1
  permission_handler: ^12.0.1
  dart_discord_presence: ^1.2.0
  window_proc_delegate: ^0.0.3
  win32: ^5.15.0
  ffi: ^2.2.0
  metadata_god: ^1.1.0
  flutter_rust_bridge: 2.11.1
  ffmpeg_kit_audio_flutter: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  assets:
    - assets/images/tray_icon.ico
    - assets/bin/yt-dlp.exe
    - assets/bin/ffmpeg.exe
    - assets/bin/ffprobe.exe
    - assets/bin/deno.exe
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"  # your 1024x1024 PNG
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256
